<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Ambient background layer for contrast inside the browser tab -->
  <rect width="32" height="32" rx="6" fill="#090d16"/>
  
  <!-- Subtle background structural glow -->
  <circle cx="16" cy="16" r="10" fill="#22d3ee" opacity="0.1" filter="blur(3px)"/>

  <!-- Outer Isometric Box Frame (The Protocol Layer) -->
  <path
    d="M16 3L28 9.5V22.5L16 29L4 22.5V9.5L16 3Z"
    stroke="url(#sophisticatedCyan)"
    stroke-width="1.25"
    stroke-linejoin="round"
    opacity="0.4"
  />

  <!-- Internal Structural Facets (Provenance Chains) -->
  <path
    d="M16 3V11.5M4 9.5L12 13.5M28 9.5L20 13.5M4 22.5L12 18.5M28 22.5L20 18.5M16 29V20.5"
    stroke="url(#sophisticatedCyan)"
    stroke-width="1"
    stroke-linecap="round"
    opacity="0.25"
  />

  <!-- Core Verification Node (The Single Source of Truth) -->
  <path
    d="M16 10L22 16L16 22L10 16L16 10Z"
    fill="url(#coreGlow)"
    stroke="#22d3ee"
    stroke-width="1.5"
    stroke-linejoin="round"
  />
  
  <!-- Center Genesis Point -->
  <circle cx="16" cy="16" r="1.5" fill="#ffffff" />

  <!-- Gradients -->
  <defs>
    <linearGradient id="sophisticatedCyan" x1="4" y1="3" x2="28" y2="29" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22d3ee"/>
      <stop offset="0.5" stop-color="#06b6d4"/>
      <stop offset="1" stop-color="#0891b2"/>
    </linearGradient>
    <linearGradient id="coreGlow" x1="10" y1="10" x2="22" y2="22" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22d3ee" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#0891b2" stop-opacity="0.0"/>
    </linearGradient>
  </defs>
</svg>
